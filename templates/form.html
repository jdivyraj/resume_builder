<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar ul {
    list-style: none;
    padding: 0;
}

.sidebar li {
    padding: 12px;
    cursor: pointer;
}

.sidebar li:hover {
    background: rgba(255,255,255,0.2);
}

/* Form Area */
.form-area {
    width: 100%;
    padding: 30px;
    background: white;
    overflow-y: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px 15px;
    border: none;
    background: #667eea;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* Type selector */
.type-selector {
    margin-bottom: 20px;
}

.type-selector button {
    margin-right: 10px;
}

/* Sections */
.hidden {
    display: none;
}

h3 {
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>ResumeX</h2>
        <ul>
            <li onclick="showSection('personal')">👤 Personal</li>
            <li onclick="showSection('studentSection')">🎓 Student</li>
            <li onclick="showSection('jobSection')">💼 Job</li>
        </ul>
    </div>

    <!-- Form -->
    <div class="form-area">

        <form action="/generate" method="POST">

            <!-- Resume Type -->
            <div class="type-selector">
                <button type="button" onclick="setType('student')">🎓 Student</button>
                <button type="button" onclick="setType('job')">💼 Job</button>
            </div>

            <!-- PERSONAL -->
            <div id="personal" class="section">
                <h3>Personal Info</h3>
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="text" name="role" placeholder="Your Role">
                <input type="email" name="email" placeholder="Email">
                <input type="text" name="phone" placeholder="Phone">
            </div>

            <!-- STUDENT -->
            <div id="studentSection" class="section">
                <h3>Education</h3>
                <input type="text" name="college" placeholder="College Name">
                <input type="text" name="degree" placeholder="Degree">

                <h3>Projects</h3>
                <input type="text" name="projects" placeholder="Your Projects">

                <h3>Skills</h3>
                <input type="text" name="skills" placeholder="Skills">
            </div>

            <!-- JOB -->
            <div id="jobSection" class="section hidden">
                <h3>Experience</h3>
                <input type="text" name="experience" placeholder="Work Experience">

                <h3>Company</h3>
                <input type="text" name="company" placeholder="Company Name">

                <h3>Skills</h3>
                <input type="text" name="skills" placeholder="Skills">
            </div>

            <br>
            <button type="submit">Generate Resume</button>

        </form>

    </div>

</div>

<script>
function showSection(sectionId) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.add("hidden"));
    document.getElementById(sectionId).classList.remove("hidden");
}

function setType(type) {
    if (type === "student") {
        document.getElementById("studentSection").classList.remove("hidden");
        document.getElementById("jobSection").classList.add("hidden");
    } else {
        document.getElementById("studentSection").classList.add("hidden");
        document.getElementById("jobSection").classList.remove("hidden");
    }
}
</script>

</body>
</html>
