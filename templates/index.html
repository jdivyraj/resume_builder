<!DOCTYPE html>
<html>
<head>
<title>ResumePro</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    font-weight: bold;
}

.logo {
    font-size: 20px;
}

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
}

.hero h1 {
    font-size: 55px;
    margin-bottom: 10px;
}

.hero p {
    color: #e0e7ff;
    margin-bottom: 30px;
}

/* BUTTONS */
.btn {
    padding: 12px 25px;
    border-radius: 8px;
    margin: 10px;
    text-decoration: none;
    color: white;
    display: inline-block;
    transition: 0.3s;
}

.login {
    background: rgba(255,255,255,0.2);
}

.signup {
    background: #10b981;
}

.btn:hover {
    transform: translateY(-3px);
}

/* FEATURES */
.features {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
}

.feature {
    text-align: center;
    max-width: 150px;
}

.feature i {
    font-size: 25px;
    margin-bottom: 10px;
}

/* FLOATING SHAPES */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
}

.c1 { width: 200px; height: 200px; top: 10%; left: 10%; }
.c2 { width: 150px; height: 150px; bottom: 15%; right: 10%; }
.c3 { width: 100px; height: 100px; top: 60%; left: 20%; }

</style>
</head>

<body>

<!-- BACKGROUND SHAPES -->
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">✨ ResumePro</div>
    <div class="nav-links">
        <a href="/login">Login</a>
        <a href="/signup">Signup</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">

    <h1>Build Stunning Resumes<br>in Minutes</h1>
    <p>Create job-winning resumes with modern templates and instant preview.</p>

    <div>
        <a href="/login" class="btn login">Login</a>
        <a href="/signup" class="btn signup">Get Started</a>
    </div>

    <div class="features">
        <div class="feature">
            <i class="fas fa-file-alt"></i>
            <p>Templates</p>
        </div>

        <div class="feature">
            <i class="fas fa-eye"></i>
            <p>Live Preview</p>
        </div>

        <div class="feature">
            <i class="fas fa-download"></i>
            <p>Export PDF</p>
        </div>
    </div>

</div>

</body>
</html>
