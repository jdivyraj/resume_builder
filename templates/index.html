<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0e7ff, #fce7f3);
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            margin: 10px;
            display: inline-block;
            transition: 0.3s;
        }

        .login {
            background: #4f46e5;
        }

        .signup {
            background: #10b981;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .features {
            margin-top: 40px;
            text-align: left;
        }

        .feature {
            margin: 10px 0;
            color: #444;
        }

        .logo {
            font-size: 18px;
            margin-bottom: 10px;
            color: #6366f1;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="logo">✨ ResumePro</div>

        <h1>Build Your Resume in Minutes</h1>
        <p>Create professional resumes that stand out and get you hired.</p>

        <a href="/login" class="btn login">Login</a>
        <a href="/signup" class="btn signup">Get Started</a>

        <div class="features">
            <div class="feature">✔ Modern Resume Templates</div>
            <div class="feature">✔ Instant Preview</div>
            <div class="feature">✔ Download as PDF</div>
        </div>

    </div>
</div>

</body>
</html>
